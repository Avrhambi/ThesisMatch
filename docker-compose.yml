services:
  db:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: thesismatch
      POSTGRES_PASSWORD: thesismatch
      POSTGRES_DB: thesismatch
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thesismatch -d thesismatch"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
